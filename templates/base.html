<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .navbar {
            background: #0f172a;
            color: white;
            padding: 18px 0;
        }

        .container {
            width: 92%;
            max-width: 1120px;
            margin: auto;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
        }

        .brand p {
            margin: 4px 0 0;
            font-size: 13px;
            opacity: 0.8;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
        }

        .page {
            padding: 24px 0 40px;
        }

        .flash {
            background: #dcfce7;
            color: #166534;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 22px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .stat h3 {
            margin: 0 0 10px;
            font-size: 15px;
            color: #475569;
        }

        .stat p {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }

        .grid-two {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .panel-header h3 {
            margin: 0;
        }

        .panel-header a {
            text-decoration: none;
            color: #2563eb;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: #f8fafc;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
        }

        .btn.secondary {
            background: #0f766e;
        }

        .form-box {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .form-box label {
            display: block;
            margin: 14px 0 6px;
            font-weight: bold;
        }

        .form-box input,
        .form-box select,
        .form-box textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
            textarea {
             resize: vertical;
            min-height: 100px;
                    }
        }

        .receipt-preview {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            margin-bottom: 14px;
        }

        .ocr-box {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px;
            max-height: 220px;
            overflow-y: auto;
        }

        .ocr-box p {
            margin: 0 0 8px;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-transform: capitalize;
        }

        .badge.expense {
            background: #ef4444;
        }

        .badge.income {
            background: #22c55e;
        }

        .thumb {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .quick-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (max-width: 900px) {
            .grid-two {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-inner">
            <div class="brand">
                <h1>Expense Tracker</h1>
                <p>Receipt Scanner + Manual Input</p>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('scan_receipt') }}">Scan Receipt</a>
                <a href="{{ url_for('manual_input') }}">Manual Input</a>
                <a href="{{ url_for('transactions') }}">Transactions</a>
                <a href="{{ url_for('advisor') }}">AI Advisor</a>
            </div>
        </div>
    </nav>

    <div class="container page">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
